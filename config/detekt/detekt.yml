build:
  maxIssues: 0

comments:
  UndocumentedPublicClass:
    active: false

complexity:
  LongMethod:
    active: true
    threshold: 60
    ignoreAnnotated:
      - 'Composable'
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 8
    ignoreAnnotated:
      - 'Composable'

naming:
  FunctionNaming:
    ignoreAnnotated:
      - 'Composable'
  # Gson / API DTOs use JSON snake_case field names as constructor parameters.
  ConstructorParameterNaming:
    active: false

style:
  WildcardImport:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
