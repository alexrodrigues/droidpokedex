name: PR Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle caching
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permissions to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Warm Gradle dependency cache
        run: ./gradlew dependencies --no-daemon

  gradle-checks:
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [detekt, ktlintCheck, testDebugUnitTest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle caching
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permissions to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run ${{ matrix.task }}
        run: ./gradlew ${{ matrix.task }}

  coverage:
    needs: install
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle caching
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permissions to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run unit tests and generate coverage report
        run: ./gradlew testDebugUnitTest jacocoFullReport

      - name: Post coverage to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: build/reports/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          min-coverage-changed-files: 70
          title: Unit Test Coverage (incl. Paparazzi)
          update-comment: true

  ai-review:
    needs: install
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/quality_agent/requirements.txt

      - name: Run AI PR review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/quality_agent/pr_reviewer.py

  ai-ui-test-gen:
    needs: install
    if: ${{ secrets.OPENAI_API_KEY != '' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/quality_agent/requirements.txt

      - name: Run Maestro UI test generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/quality_agent/maestro_generator.py
